name: ci

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/harrisra/getsorted-backend
  FRONTEND_IMAGE: ghcr.io/harrisra/getsorted-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: backend
          target: prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.short }}
            ${{ env.BACKEND_IMAGE }}:latest

  build-frontend-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: frontend
          target: prod
          push: true
          build-args: VITE_API_BASE_URL=https://getsorted-api-dev.harristribelabs.co.uk
          tags: |
            ${{ env.FRONTEND_IMAGE }}:dev-${{ steps.sha.outputs.short }}
            ${{ env.FRONTEND_IMAGE }}:dev-latest

  build-frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: frontend
          target: prod
          push: true
          build-args: VITE_API_BASE_URL=https://getsorted-api-test.harristribelabs.co.uk
          tags: |
            ${{ env.FRONTEND_IMAGE }}:test-${{ steps.sha.outputs.short }}
            ${{ env.FRONTEND_IMAGE }}:test-latest

  build-frontend-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: frontend
          target: prod
          push: true
          build-args: VITE_API_BASE_URL=https://getsorted-api.harristribelabs.co.uk
          tags: |
            ${{ env.FRONTEND_IMAGE }}:prod-${{ steps.sha.outputs.short }}
            ${{ env.FRONTEND_IMAGE }}:prod-latest

  deploy-dev-test:
    needs: [build-backend, build-frontend-dev, build-frontend-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout harristribelabs
        uses: actions/checkout@v4
        with:
          repository: harrisra/harristribelabs
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: harristribelabs

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update dev overlay
        working-directory: harristribelabs/k8s/apps/getsorted/overlays/dev
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.sha }}
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:dev-${{ needs.build-backend.outputs.sha }}

      - name: Update test overlay
        working-directory: harristribelabs/k8s/apps/getsorted/overlays/test
        run: |
          kustomize edit set image ${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.sha }}
          kustomize edit set image ${{ env.FRONTEND_IMAGE }}:test-${{ needs.build-backend.outputs.sha }}

      - name: Commit and push
        working-directory: harristribelabs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/getsorted/overlays/dev/kustomization.yaml \
                  k8s/apps/getsorted/overlays/test/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "deploy: getsorted ${{ needs.build-backend.outputs.sha }} → dev + test" && \
            git push